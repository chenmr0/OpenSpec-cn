name: spec-driven
version: 2
description: 默认 OpenSDD 工作流 - 头脑风暴 → 规范 → 设计 → 计划
artifacts:
  - id: specs
    generates: spec.md
    description: 包含 WHEN/THEN 场景的需求规范
    template: spec.md
    instruction: |
      创建定义系统"应该做什么"的规范文件（WHAT）。

      基于头脑风暴阶段探索和批准的设计，提取每个能力的 WHEN/THEN 场景。

      将所有需求规范写入 spec.md 文件，按能力分区组织。

      增量操作（使用 ## 标题）：
      - **ADDED Requirements**: 新功能
      - **MODIFIED Requirements**: 行为变更 - 必须包含完整的更新内容
      - **REMOVED Requirements**: 弃用的特性 - 必须包含 **Reason**（原因）和 **Migration**（迁移方案）
      - **RENAMED Requirements**: 仅限名称变更 - 使用 FROM:/TO: 格式

      格式要求：
      - 每个需求：`### 需求:<名称>` 后面跟描述
      - 使用 SHALL/MUST/必须/禁止等规范性词汇（避免使用 should/may）
      - 每个场景：`#### 场景:<名称>` 使用 当/那么（WHEN/THEN）格式
      - **关键提示**：场景标题必须恰好使用 4 个井号 (`####`)。使用 3 个井号或列表将导致处理失败。
      - 每个需求必须至少有一个场景。

      示例：
      ```
      ## ADDED Requirements

      ### 需求:用户可以导出数据
      系统应当允许用户以 CSV 格式导出其数据。

      #### 场景:成功导出
      - **当** 用户点击"导出"按钮
      - **那么** 系统下载包含所有用户数据的 CSV 文件

      ## REMOVED Requirements

      ### 需求:旧版导出
      **Reason**: 被新导出系统取代
      **Migration**: 使用 /api/v2/export 处的新导出端点
      ```

      编写规范后，执行自检：
      1. 场景完整性：每个需求是否至少有一个 WHEN/THEN 场景？
      2. 可测试性：每个场景是否足够具体，可以转化为测试用例？
      3. 内部一致性：各需求之间有矛盾吗？
      4. 范围检查：是否聚焦到可以用一个实现计划覆盖？
      5. 模糊性检查：有没有需求可以被两种方式理解？

      发现问题时直接内联修复。无需重新审查——修好继续推进。

      然后请用户在继续之前审查规范文档。

      规范应当是可测试的 —— 每个场景都是一个潜在的测试用例。
    requires: []

  - id: design
    generates: design.md
    description: 包含架构和决策的技术设计文档
    template: design.md
    instruction: |
      创建说明"如何实现"变更的设计文档（HOW）。

      在规范获得用户批准后，从头脑风暴中提取技术设计。

      章节：
      - **Context**: 背景、当前状态、约束
      - **Goals / Non-Goals**: 此设计旨在实现的目标以及明确排除的目标
      - **Decisions**: 关键技术选择及其理由（为什么选 X 而不是 Y？）。列出每个决策考虑过的替代方案。
        格式：
        ```
        ### [决策名称]
        - **选择：** [做了什么选择]
        - **理由：** [为什么这样选择]
        - **备选方案：** [考虑过但未采用的方案]
        ```
      - **Architecture**: 组件结构、数据流、错误处理
      - **Risks / Trade-offs**: 已知限制、可能出现的问题。格式：[风险] → 缓解措施

      编写设计后，执行自检：
      1. 需求追溯：每个设计决策是否可以追溯到 SPEC 中的某个需求？
      2. 占位符扫描：有没有"待定"、"TODO"、未完成的章节？修复它们。
      3. 内部一致性：架构和决策是否匹配？组件结构与数据模型是否一致？
      4. 孤立设计：有没有设计元素没有对应的需求支撑？如果有，移除或补充需求。
      5. 可构建性：工程师能否基于此设计编写实现计划？

      发现问题时直接内联修复。无需重新审查——修好继续推进。

      然后请用户在继续之前审查设计文档。
    requires:
      - specs

  - id: plan
    generates: plan.md
    description: 包含文件结构和详细任务的实现计划
    template: plan.md
    instruction: |
      创建全面的实现计划，将工作分解为小的、可验证的步骤。

      阅读规范（要构建的内容）和设计（如何构建）。然后定义文件结构和任务。

      **文件结构**：在定义任务之前，列出将要创建或修改的文件以及每个文件的职责。这是锁定分解决策的地方。

      **计划文档头部**：每个计划必须以此头部开始：

      ```
      # [功能名称] 实现计划

      > 步骤使用复选框 (`- [ ]`) 语法来跟踪进度。

      **目标：** [一句话描述要构建什么]
      **架构：** [2-3 句话描述方案]
      **技术栈：** [关键技术/库]
      **规格：** [spec.md 路径]
      **设计：** design.md

      ---
      ```

      **任务结构**：每个任务必须包含精确的文件路径和完整代码——如果步骤涉及代码变更，就展示代码。

      ````markdown
      ### 任务 N：[组件名称]

      **文件：**
      - 创建：`exact/path/to/file.py`
      - 修改：`exact/path/to/existing.py:123-145`
      - 测试：`tests/exact/path/to/test.py`

      - [ ] **步骤 1：编写实现代码**

      ```python
      def function(input):
          return expected
      ```

      - [ ] **步骤 2：编译检查**

      运行：`pytest tests/path/test.py::test_name -v`
      预期：PASS

      - [ ] **步骤 3：Commit**

      ```bash
      git add tests/path/test.py src/path/file.py
      git commit -m "feat: add specific feature"
      ```
      ````

      **重要提示：严格遵循复选框格式。** 应用阶段会解析复选框格式来跟踪进度。不使用 `- [ ]` 格式的任务将不会被跟踪。

      **禁止占位符**——以下是计划缺陷，绝不要写出来：
      - "待定"、"TODO"、"后续实现"、"补充细节"
      - "添加适当的错误处理" / "添加验证" / "处理边界情况"（没有具体内容）
      - "为上述代码编写测试"（没有实际测试代码）
      - "类似任务 N"（重复引用——工程师可能不按顺序阅读任务）
      - 只描述做什么而不展示怎么做的步骤（代码步骤必须有代码块）
      - 引用了未在任何任务中定义的类型、函数或方法

      编写完整计划后，执行自检：
      1. 规格覆盖度：浏览 SPEC 中的每个需求和 WHEN/THEN 场景。你能指出实现它的任务吗？检查每个 WHEN/THEN 场景是否在计划中有对应的验证步骤。列出所有遗漏。
      2. 占位符扫描：搜索计划中的红旗——上方"禁止占位符"章节中的任何模式。修复它们。
      3. 类型一致性：后续任务中使用的类型、方法签名和属性名是否与前面任务中定义的一致？

      如果发现问题，直接内联修复。修复后继续推进。如果发现规格中的需求没有对应任务，就添加任务。

      参考 specs 了解要构建的内容，参考 design 了解如何构建它。每个任务应当是可验证的——你能知道它何时完成。
    requires:
      - specs
      - design

apply:
  requires: [plan]
  tracks: plan.md
  instruction: |
    阅读上下文文件，逐个处理待办任务（`- [ ]` 复选框），并在完成后标记为 `- [x]`。如果遇到阻碍或需要澄清，请暂停。
