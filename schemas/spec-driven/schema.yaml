name: spec-driven
version: 2
description: 默认 CodeSpec 工作流 - 头脑风暴 → 规范 → 设计 → 计划
artifacts:
  - id: specs
    generates: spec.md
    description: 包含业务规则、交互流程、异常场景和数据约束的需求规范
    template: spec.md
    requires: []

  - id: design
    generates: design.md
    description: 包含架构和决策的技术设计文档
    template: design.md
    requires:
      - specs

  - id: task
    generates: task.md
    description: 包含文件结构和详细任务的实现计划
    template: task.md
    requires:
      - specs
      - design

apply:
  requires: [task]
  tracks: task.md
  instruction: |
    逐个处理待办任务(使用 Todo 跟踪，并在任务完成后刷新任务状态)
