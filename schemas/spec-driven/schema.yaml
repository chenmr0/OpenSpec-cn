name: spec-driven
version: 2
description: 默认 CodeSpec 工作流 - 头脑风暴 → 规范 → 设计 → 计划
artifacts:
  - id: specs
    generates: spec.md
    description: WHAT：业务规则、验收条件、异常场景和领域约束
    template: spec.md
    requires: []

  - id: design
    generates: design.md
    description: HOW：技术目标、设计决策、模块/数据/接口变更、风险与验证
    template: design.md
    requires:
      - specs

  - id: task
    generates: task.md
    description: DO：文件结构、可执行任务、验证命令和进度复选框
    template: task.md
    requires:
      - specs
      - design

apply:
  requires: [task]
  tracks: task.md
  instruction: |
    逐个处理待办任务(使用 Todo 跟踪，并在任务完成后刷新任务状态)
